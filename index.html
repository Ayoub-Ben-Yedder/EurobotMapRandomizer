<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurobot Map Randomizer</title>
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Randomize Eurobot map slots quickly on desktop and mobile.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eurobot Map">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

        :root {
            --ui-bg: rgba(255, 255, 255, 0.88);
            --ui-border: rgba(12, 38, 58, 0.18);
            --ui-shadow: 0 12px 30px rgba(8, 25, 40, 0.22);
            --ui-text: #102a3b;
            --ui-subtle: #5a7082;
            --action: #0f6f99;
            --action-strong: #0a587a;
            --action-accent: #f7b500;
            --radius: 14px;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
            font-family: 'Space Grotesk', 'Trebuchet MS', sans-serif;
        }

        body {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            padding: 4px;
            box-sizing: border-box;
            gap: 10px;
            height: 100dvh;
        }

        #mapCanvas {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 0;
            display: block;
            touch-action: none;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
        }

        #mapIdDisplay {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 12px);
            right: calc(env(safe-area-inset-right, 0px) + 12px);
            z-index: 10;
            background: rgba(16, 42, 59, 0.9);
            color: #f4fbff;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            user-select: all;
            display: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        #mapIdDisplay.active {
            display: block;
        }

        #randomizeButton {
            grid-column: 1 / -1;
        }

        #container {
            position: relative;
            width: min(560px, 100%);
            justify-self: center;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 8px;
            box-sizing: border-box;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            border-radius: var(--radius);
            box-shadow: var(--ui-shadow);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px;
        }

        #container > * {
            min-width: 0;
        }

        #mapCodeInput,
        #loadMapButton,
        #randomizeButton {
            border: 1px solid #9cb4c3;
            border-radius: 10px;
            height: 42px;
            font: inherit;
            font-size: 14px;
            box-sizing: border-box;
        }

        #mapCodeInput {
            padding: 0 12px;
            color: var(--ui-text);
            background: #fcfeff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #mapCodeInput::placeholder {
            color: var(--ui-subtle);
        }

        #mapCodeInput:focus {
            border-color: var(--action);
            box-shadow: 0 0 0 3px rgba(15, 111, 153, 0.2);
        }

        #loadMapButton,
        #randomizeButton {
            color: #f2faff;
            background: linear-gradient(145deg, var(--action), var(--action-strong));
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 6px 14px rgba(12, 57, 86, 0.25);
        }

        #randomizeButton {
            background: linear-gradient(145deg, var(--action-accent), #e8a700);
            color: #1d1a0f;
            box-shadow: 0 6px 14px rgba(97, 74, 8, 0.22);
        }

        #loadMapButton:hover,
        #randomizeButton:hover {
            filter: brightness(1.03);
            transform: translateY(-1px);
        }

        #loadMapButton:active,
        #randomizeButton:active {
            transform: translateY(0);
            box-shadow: 0 3px 8px rgba(12, 57, 86, 0.2);
        }

        @media (max-width: 720px) {
            #container {
                width: 100%;
                grid-template-columns: 1fr;
            }

            #randomizeButton {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>
    <canvas id="mapCanvas"></canvas>
    <div id="mapIdDisplay" title="Click to copy"></div>
    <div id="container">
        <input type="text" id="mapCodeInput" placeholder="Enter map code">
        <button id="loadMapButton" onclick="handleLoadMapClick()">Load Map</button>
        <button id="randomizeButton" onclick="randomizeMap()">Randomize Map</button>
    </div>
    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const mapImage = new Image();
        mapImage.src = 'map.png';
        const teamColors = ['#f7b500', '#005b8c'];
        // Normalized values: x/y/w/h are in 0..1 relative to map image area.
        const rectangleSlots = [
            // Lot 1
            { x: 0.15, y: 0.05, w: 0.025, h: 0.035 },
            { x: 0.175, y: 0.05, w: 0.025, h: 0.035 },
            { x: 0.20, y: 0.05, w: 0.025, h: 0.035 },
            { x: 0.225, y: 0.05, w: 0.025, h: 0.035 },
            // Lot 2
            { x: 0.15+0.4, y: 0.05, w: 0.025, h: 0.035 },
            { x: 0.175+0.4, y: 0.05, w: 0.025, h: 0.035 },
            { x: 0.20+0.4, y: 0.05, w: 0.025, h: 0.035 },
            { x: 0.225+0.4, y: 0.05, w: 0.025, h: 0.035 },
             // Lot 3
            { x: 0.15, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
            { x: 0.175, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
            { x: 0.20, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
            { x: 0.225, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
             // Lot 4
            { x: 0.15+0.4, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
            { x: 0.175+0.4, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
            { x: 0.20+0.4, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
            { x: 0.225+0.4, y: 0.05 + 0.865, w: 0.025, h: 0.035 },
            // Lot 5
            { x: 0.365, y:0.35, w: 0.07, h: 0.02 },
            { x: 0.365, y:0.37, w: 0.07, h: 0.02 },
            { x: 0.365, y:0.39, w: 0.07, h: 0.02 },
            { x: 0.365, y:0.41, w: 0.07, h: 0.02 },
            // Lot 6
            { x: 0.365, y:0.35 + 0.23, w: 0.07, h: 0.02 },
            { x: 0.365, y:0.37 + 0.23, w: 0.07, h: 0.02 },
            { x: 0.365, y:0.39 + 0.23, w: 0.07, h: 0.02 },
            { x: 0.365, y:0.41 + 0.23, w: 0.07, h: 0.02 },
            // Lot 7
            { x: 0.365-0.31, y:0.35 - 0.015, w: 0.07, h: 0.02 },
            { x: 0.365-0.31, y:0.37- 0.015, w: 0.07, h: 0.02 },
            { x: 0.365-0.31, y:0.39- 0.015, w: 0.07, h: 0.02 },
            { x: 0.365-0.31, y:0.41- 0.015, w: 0.07, h: 0.02 },
            // Lot 8
            { x: 0.365-0.31, y:0.35 + 0.25, w: 0.07, h: 0.02 },
            { x: 0.365-0.31, y:0.37 + 0.25, w: 0.07, h: 0.02 },
            { x: 0.365-0.31, y:0.39 + 0.25, w: 0.07, h: 0.02 },
            { x: 0.365-0.31, y:0.41 + 0.25, w: 0.07, h: 0.02 },
            // Lot 9
            { x: 0.826, y:0.35, w: 0.07, h: 0.02 },
            { x: 0.826, y:0.37, w: 0.07, h: 0.02 },
            // Lot 10
            { x: 0.85, y:0.43, w: 0.07, h: 0.02 },
            { x: 0.85, y:0.45, w: 0.07, h: 0.02 },
            // Lot 11
            { x: 0.85, y:0.53, w: 0.07, h: 0.02 },
            { x: 0.85, y:0.55, w: 0.07, h: 0.02 },
            // Lot 12
            { x: 0.826, y:0.615, w: 0.07, h: 0.02 },
            { x: 0.826, y:0.635, w: 0.07, h: 0.02 },
        ];
        const rectangles = rectangleSlots.map((slot, index) => ({
            ...slot,
            color: teamColors[index % 2]
        }));

        function randomTeamColor() {
            return teamColors[Math.floor(Math.random() * teamColors.length)];
        }

        function randomizeRectangles() {
            // Randomize colors so each Lot has exactly half blue and half yellow
            // Lots 1-8 have 4 slots each, Lots 9-12 have 2 slots each
            const lotConfigs = [
                { start: 0, count: 4 },   // Lot 1
                { start: 4, count: 4 },   // Lot 2
                { start: 8, count: 4 },   // Lot 3
                { start: 12, count: 4 },  // Lot 4
                { start: 16, count: 4 },  // Lot 5
                { start: 20, count: 4 },  // Lot 6
                { start: 24, count: 4 },  // Lot 7
                { start: 28, count: 4 },  // Lot 8
                { start: 32, count: 2 },  // Lot 9
                { start: 34, count: 2 },  // Lot 10
                { start: 36, count: 2 },  // Lot 11
                { start: 38, count: 2 },  // Lot 12
            ];
            
            lotConfigs.forEach((lot) => {
                // Create an array with equal numbers of each color
                const colors = [];
                const halfCount = lot.count / 2;
                for (let i = 0; i < halfCount; i++) {
                    colors.push(teamColors[0]);
                }
                for (let i = 0; i < halfCount; i++) {
                    colors.push(teamColors[1]);
                }
                
                // Shuffle the colors
                for (let i = colors.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [colors[i], colors[j]] = [colors[j], colors[i]];
                }
                
                // Assign the shuffled colors to each slot in this lot
                for (let i = 0; i < lot.count; i++) {
                    rectangles[lot.start + i].color = colors[i];
                }
            });
        }

        function drawMap() {
            if (!mapImage.complete || mapImage.naturalWidth === 0 || mapImage.naturalHeight === 0) {
                return;
            }

            const viewportWidth = canvas.clientWidth;
            const viewportHeight = canvas.clientHeight;
            const scale = Math.min(
                viewportWidth / mapImage.naturalWidth,
                viewportHeight / mapImage.naturalHeight
            );
            const drawWidth = mapImage.naturalWidth * scale;
            const drawHeight = mapImage.naturalHeight * scale;
            const offsetX = (viewportWidth - drawWidth) / 2;
            const offsetY = (viewportHeight - drawHeight) / 2;

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, viewportWidth, viewportHeight);
            ctx.drawImage(mapImage, offsetX, offsetY, drawWidth, drawHeight);
            drawRectangles({ offsetX, offsetY, drawWidth, drawHeight });
        }

        function drawRectangles(layout) {
            ctx.save();
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#111';

            rectangles.forEach((rect) => {
                const x = layout.offsetX + rect.x * layout.drawWidth;
                const y = layout.offsetY + rect.y * layout.drawHeight;
                const w = rect.w * layout.drawWidth;
                const h = rect.h * layout.drawHeight;

                ctx.fillStyle = rect.color;
                ctx.fillRect(x, y, w, h);
                ctx.strokeRect(x, y, w, h);
            });

            ctx.restore();
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const viewportWidth = canvas.clientWidth;
            const viewportHeight = canvas.clientHeight;

            if (viewportWidth === 0 || viewportHeight === 0) {
                return;
            }

            canvas.width = Math.round(viewportWidth * dpr);
            canvas.height = Math.round(viewportHeight * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            drawMap();
        }

        let resizeRaf = null;
        function scheduleResizeCanvas() {
            if (resizeRaf !== null) {
                return;
            }
            resizeRaf = window.requestAnimationFrame(() => {
                resizeRaf = null;
                resizeCanvas();
            });
        }

        function generateMapId() {
            // Convert the current colors to a compact ID
            // Use 0 for first color, 1 for second color
            let binaryString = '';
            rectangles.forEach((rect) => {
                binaryString += rect.color === teamColors[0] ? '0' : '1';
            });
            // Convert binary string to hexadecimal
            const hexId = parseInt(binaryString, 2).toString(36).toUpperCase();
            return hexId;
        }

        function loadMapFromId(mapId) {
            try {
                // Convert base36 back to binary
                const binaryString = parseInt(mapId, 36).toString(2);
                // Pad with zeros if necessary to match slot count (40 slots = 40 bits)
                const paddedBinary = binaryString.padStart(40, '0');
                
                // Apply colors to rectangles based on binary string
                rectangles.forEach((rect, index) => {
                    rect.color = paddedBinary[index] === '0' ? teamColors[0] : teamColors[1];
                });
                
                drawMap();
                displayMapId();
                return true;
            } catch (e) {
                console.error('Invalid map code:', e);
                return false;
            }
        }

        function handleLoadMapClick() {
            const code = document.getElementById('mapCodeInput').value.trim().toUpperCase();
            if (code) {
                if (loadMapFromId(code)) {
                    document.getElementById('mapCodeInput').value = '';
                    document.getElementById('mapCodeInput').style.borderColor = '#444';
                } else {
                    document.getElementById('mapCodeInput').style.borderColor = '#f00';
                    setTimeout(() => {
                        document.getElementById('mapCodeInput').style.borderColor = '#444';
                    }, 1500);
                }
            }
        }

        function displayMapId() {
            const mapId = generateMapId();
            const idDisplay = document.getElementById('mapIdDisplay');
            idDisplay.textContent = 'Map ID: ' + mapId;
            idDisplay.classList.add('active');
            
            // Copy to clipboard on click
            idDisplay.onclick = () => {
                navigator.clipboard.writeText(mapId).then(() => {
                    const originalText = idDisplay.textContent;
                    idDisplay.textContent = 'Copied!';
                    setTimeout(() => {
                        idDisplay.textContent = originalText;
                    }, 1500);
                });
            };
        }

        function randomizeMap() {
            randomizeRectangles();
            drawMap();
            displayMapId();
        }

        mapImage.addEventListener('load', scheduleResizeCanvas);
        window.addEventListener('resize', scheduleResizeCanvas);
        window.addEventListener('orientationchange', scheduleResizeCanvas);

        if ('ResizeObserver' in window) {
            const layoutObserver = new ResizeObserver(() => {
                scheduleResizeCanvas();
            });
            layoutObserver.observe(document.body);
            layoutObserver.observe(canvas);
            layoutObserver.observe(document.getElementById('container'));
        }

        scheduleResizeCanvas();

        // Handle map code input
        const mapCodeInput = document.getElementById('mapCodeInput');
        mapCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const code = mapCodeInput.value.trim().toUpperCase();
                if (code) {
                    if (loadMapFromId(code)) {
                        mapCodeInput.value = '';
                        mapCodeInput.style.borderColor = '#444';
                    } else {
                        mapCodeInput.style.borderColor = '#f00';
                        setTimeout(() => {
                            mapCodeInput.style.borderColor = '#444';
                        }, 1500);
                    }
                }
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch((error) => {
                    console.error('Service worker registration failed:', error);
                });
            });
        }
    </script>
</body>
</html>
